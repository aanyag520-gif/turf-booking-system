<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Login – Turf Booking System</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span style="font-size:15px;">🌿</span><span>Turf Booking System</span></a>
  <div class="right">
    <a href="#">About Us</a><a href="#">Contact Us</a>
    <span class="sep">|</span>
    <a href="register.html">Register Customer</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="auth-page">
  <div class="card" style="width:230px;">
    <div class="card-head">User Login</div>
    <div class="card-body">
      <div class="fg"><label>User Role</label><select id="role"><option value="customer">Customer</option><option value="admin">Admin / Owner</option></select></div>
      <div class="fg"><label>Email Id</label><input type="email" id="em" placeholder="customer@gmail.com"/></div>
      <div class="fg"><label>Password</label><input type="password" id="pw" placeholder="••••"/></div>
      <button class="btn-dark" onclick="doLogin()">Login</button>
      <p class="fswitch" style="margin-top:8px;">No account? <a href="register.html">Register</a></p>
    </div>
  </div>
</div>

<div class="toast" id="t"></div>
<script>
function toast(m){var t=document.getElementById('t');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function doLogin(){
  var e=document.getElementById('em').value.trim();
  var p=document.getElementById('pw').value.trim();
  var r=document.getElementById('role').value;
  if(!e||!p){toast('Enter email and password.');return;}
  toast('Login successful!');
  if(r==='admin')setTimeout(function(){window.location.href='admin.html';},1200);
  else setTimeout(function(){window.location.href='discover.html';},1200);
}
</script>
</body>
</html>
